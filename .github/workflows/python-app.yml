name: Python Bot CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/chatbot-bot

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 bot.py config.py content_seed.py generator.py scheduler.py storage.py weather.py

      - name: Verify syntax
        run: python -m py_compile bot.py config.py content_seed.py generator.py scheduler.py storage.py weather.py

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions: {}
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - name: Deploy to server via SSH
        if: env.SSH_HOST != ''
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker stop chatbot-bot 2>/dev/null || true
            docker rm chatbot-bot 2>/dev/null || true
            docker run -d \
              --name chatbot-bot \
              --restart unless-stopped \
              -e TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              -e TARGET_CHAT_ID="${{ secrets.TARGET_CHAT_ID }}" \
              -e TZ_NAME="${{ secrets.TZ_NAME }}" \
              -e OPENWEATHER_API_KEY="${{ secrets.OPENWEATHER_API_KEY }}" \
              -v chatbot-bot-data:/data \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker image prune -f

      - name: Skip deploy (SSH_HOST not configured)
        if: env.SSH_HOST == ''
        run: echo "SSH_HOST secret not set — skipping server deploy. Image is available at ghcr.io/${{ env.IMAGE_NAME }}:latest"

